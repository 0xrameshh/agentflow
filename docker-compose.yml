services:
  api:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - AGENTFLOW_RETRIEVER=keyword
    volumes:
      - ./runs:/app/runs
      - ./eval/reports:/app/eval/reports
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
